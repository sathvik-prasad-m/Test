<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to AI Coding Assistant</h1>
        <p>Your mobile-friendly coding companion</p>
    </header>
    <main>
        <section>
            <h2>Features</h2>
            <ul>
                <li>Code Review</li>
                <li>Code Modification</li>
                <li>File Creation</li>
                <li>Concise Explanations</li>
            </ul>
        </section>
        <section>
            <h2>Get Started</h2>
            <p>Type your coding queries below:</p>
            <textarea rows="4" cols="50" placeholder="Ask me anything about coding..."></textarea>
            <button type="button">Submit</button>
        </section>
    </main>
    <footer>

    </footer>

</html>
